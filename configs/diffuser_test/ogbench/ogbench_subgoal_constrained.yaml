defaults:
  - _self_
  - task: cube-double
  - low_controller: gciql

pipeline_name: subgoal_constrained_diffuser
run_alias: test_run
mode: train
seed: 0
device: cuda:0
project: Diffusion_OG_New
group: debug
enable_wandb: true

# Planner config
planner_solver: ddim
planner_emb_dim: 128
planner_d_model: 256
planner_depth: 4
planner_sampling_steps: 20
planner_predict_noise: true
planner_ema_rate: 0.995

# Training steps
batch_size: 1024
invdyn_gradient_steps: 300000
planner_diffusion_gradient_steps: 600000
log_interval: 1000
eval_interval: 10000
save_interval: 100000

# Reuse existing low controller
lowctrl_load_existing: true
lowctrl_alias: "only_object_goal_xyz"
lowctrl_load_path: ""
lowctrl_train_if_missing: true

# Subgoal-constrained planner data filtering
subgoal:
  k_goals: 20
  c_lookback: 6.0
  min_traj_length: 20
  min_subgoal_dist: 50
  max_subgoals_per_traj: 6
  max_cross_ratio: 0.25
  min_keep_ratio: 0.05
  sampling:
    strategy: hard # hard | soft
    soft_alpha: 6.0
    soft_min_weight: 0.05
  analysis:
    max_detail_rows: 50000
    table_sample_seed: 0
    histogram_bins_cross_ratio: 50
    histogram_bins_subgoal_count: 20
    histogram_bins_soft_weight: 50

# Evaluation / inference
use_diffusion_invdyn: false
planner_num_candidates: 20
planner_ckpt: latest
invdyn_ckpt: latest
planner_use_ema: true
low_controller_mode: achieve_subgoal

# Keep behavior aligned with single_layer_evaluate
enable_distance_guidance: false
adaptive_replan_horizon: false
adaptive_replan_on_error: false # Normally, adaptive_replan_on_error should be used together with adaptive_replan_horizon, but we keep it as a separate option for ablation.

num_eval_episodes: 20
num_video_episodes: 1
video_frame_skip: 3

hydra:
  job:
    chdir: false
