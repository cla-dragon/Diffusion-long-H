defaults:
  - _self_
  - task: cube-double
  - low_controller: gciql

pipeline_name: multiseg_diffuser
run_alias: gsc_jump1
mode: train
seed: 0
device: cuda:0
project: Diffusion_OG_New
group: debug
enable_wandb: true

enable_distance_guidance: false

planner_solver: ddim
planner_sampling_schedule: uniform
planner_emb_dim: 128
planner_d_model: 256
planner_depth: 4
planner_diffusion_steps: 1000
planner_sampling_steps: 50
planner_predict_noise: true
planner_ema_rate: 0.995

policy_solver: ddpm
policy_hidden_dim: 256
policy_diffusion_steps: 10
policy_sampling_steps: 10
policy_predict_noise: true
policy_ema_rate: 0.995
policy_learning_rate: 0.0003
critic_learning_rate: 0.0003

use_diffusion_invdyn: false
invdyn_gradient_steps: 600000
policy_diffusion_gradient_steps: 600000
planner_diffusion_gradient_steps: 600000
batch_size: 512
log_interval: 1000
eval_interval: 10000
save_interval: 100000

planner_num_candidates: 20
planner_ckpt: latest
critic_ckpt: latest
policy_ckpt: latest
invdyn_ckpt: latest
planner_use_ema: true
policy_temperature: 0.5
policy_use_ema: true
low_controller_mode: achieve_subgoal
adaptive_replan_horizon: false # for segment_stitch, reduce num_segments with progress instead of shrinking token-level horizon
adaptive_replan_on_error: false # keep separated for ablation, same meaning as other ogbench evaluate configs

lowctrl_alias: "only_object_goal_xyz"
lowctrl_load_existing_alias: true

subgoal_filter:
  enable: false # requires use_diffusion_invdyn: false; filtering relies on the GCIQL value function
  k_goals: 20
  c_lookback: 6.0
  min_traj_length: 20
  min_subgoal_dist: 30
  max_subgoals_per_traj: 16
  max_cross_ratio: 0.25
  min_keep_ratio: 0.3
  sampling:
    strategy: hard # hard | soft
    soft_alpha: 6.0
    soft_min_weight: 0.05
  analysis:
    max_detail_rows: 1000
    table_sample_seed: 0
    histogram_bins_cross_ratio: 50
    histogram_bins_subgoal_count: 20
    histogram_bins_soft_weight: 50

num_eval_episodes: 20
num_video_episodes: 1
video_frame_skip: 3

stitch:
  strategy: gsc
  segment_model_horizon: 90
  overlap_steps: 20
  num_segments: 2
  top_n: 5
  pick_mode: first
  merge_mode: exp
  merge_beta: 3.0
  condition_hidden_dim: 256
  condition_guidance_scale: 2.0
  gsc_inner_loops: 10
  gsc_keep_ratio: 0.1
  gsc_filter_start: 0.94
  gsc_inversion_ratio: 0.2

training_boundary:
  overlap_prob: 0.5
  side_drop_prob: 0.15

hydra:
  job:
    chdir: false
